<h2>Albums</h2>

<div *ngIf="loading">Loading...</div>

<ul *ngIf="!loading">
  <li *ngFor="let album of albums" style="margin-bottom:10px;">

    <a [routerLink]="['/albums', album.id]">
      {{ album.id }} - {{ album.title }}
    </a>

    <button
      class="btn-danger"
      (click)="delete(album.id)">
      Delete
    </button>

  </li>
</ul>
