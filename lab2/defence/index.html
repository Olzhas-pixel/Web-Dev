<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Spotify Sign Up</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
<main class="page">
    <section class="cardd">
        <div class="logotype">Sporify</div>
        <h1 class = "text_under_logo">Sign up for free</h1>
        <form class="form" action="#" method="post">
            <div class="field">
                <label for="email">Email address</label>
                <input id="email" type="email" placeholder="name@example.com" />
                <p class="hint">We'll never share your email with anyone.</p>


            </div>
            <div class="field">
                <label for="password">Password</label>
                <input id="password" type="password"  placeholder="Create a password" />
                <p class="hint">Use 8+ characters for better security.</p>
            </div>
            <div class="field">
                <label for="username">Username</label>
                <input id="username" type="text" placeholder="Pick a display name" />

            </div>
            <div class="check">
                <input id="terms" type="checkbox"  />
                <<label for="terms">
                I agree to the <a class="link" href="#">Terms and Conditions</a>
            </label>

            </div>
            <button class="button" type="submit">Sign up</button>
        </form>
        <p class="bottom">
            Already have an account?
            <a class="link" href="#">Log in</a>
        </p>
    </section>
</main>
</body>
</html>
